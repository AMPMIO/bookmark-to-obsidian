# bookmark-to-obsidian configuration
# Copy this file to config.yaml and fill in your values.
# Run ./bookmark-to-obsidian setup for an interactive wizard instead.

# ── Vault ────────────────────────────────────────────────
vault:
  path: "~/Documents/ObsidianVault"   # Path to your Obsidian vault root
  notes_folder: "Resources"           # Subfolder where tweet notes are written
  default_category: "Inbox"           # Fallback folder when no category matches

# ── Bookmarks ────────────────────────────────────────────
bookmarks:
  dir: "~/Documents/twitter-bookmarks"      # Working directory for bookmark files
  file: "bookmarks.txt"                     # Input: one tweet URL per line
  processed_file: "bookmarks-processed.txt" # Archive: URLs already processed

# ── Processing ───────────────────────────────────────────
processing:
  batch_size: 10           # Tweets to process before pausing
  batch_delay_seconds: 2   # Seconds to pause between batches (rate limiting)

# ── Categories ───────────────────────────────────────────
# Tweets are classified into folders by keyword matching against tweet text.
# Categories are checked in order — first match wins. Falls back to default_category.
# Folder created automatically if it doesn't exist.
#
# Optional: each category can include a `tags` list. These tags are merged with
# template.base_tags (below) in the note's frontmatter — no duplicates.
#
# Example: tweet matching "AI Research" with base_tags [type/tweet, source/twitter]
# and category tags [topic/ai, topic/research] produces:
#   tags: [type/tweet, source/twitter, topic/ai, topic/research]
categories:
  - name: "AI Tools"
    keywords:
      - "open-source"
      - "cli"
      - "api"
      - "github"
      - "tool"
      - "library"
      - "sdk"
      - "framework"
    tags:
      - "topic/ai"
      - "topic/tools"

  - name: "Web Development"
    keywords:
      - "react"
      - "nextjs"
      - "typescript"
      - "javascript"
      - "frontend"
      - "css"
      - "html"
      - "node"
    tags:
      - "topic/webdev"

  - name: "AI Research"
    keywords:
      - "paper"
      - "arxiv"
      - "research"
      - "benchmark"
      - "dataset"
      - "model"
      - "llm"
      - "neural"
    tags:
      - "topic/ai"
      - "topic/research"

  - name: "Productivity"
    keywords:
      - "workflow"
      - "automation"
      - "obsidian"
      - "notion"
      - "pkm"
      - "note-taking"
      - "productivity"
    tags:
      - "topic/productivity"

  # Add your own categories here. The `tags` field is optional.
  # - name: "Design"
  #   keywords:
  #     - "figma"
  #     - "ui"
  #     - "ux"
  #     - "design"
  #   tags:
  #     - "topic/design"

# ── Wikilinks (optional) ─────────────────────────────────
# Entity names wrapped in [[links]] when they appear in tweet text.
# Entities are matched as whole words (regex \b boundary). Applied longest-first
# so "React Native" is linked before "React" — prevents partial-match collisions.
# Only the first occurrence of each entity per note is linked.
# Only useful if these pages actually exist in your vault.
#
# Dict format (entity → link target):
#   wikilinks:
#     "React Native": "[[React Native]]"
#     "React": "[[React MOC]]"        # safe: "React Native" matched first
#     "TypeScript": "[[TypeScript]]"
#
# List format (entity only, auto-wraps in [[entity]]):
#   wikilinks:
#     - entity: "React Native"
#     - entity: "React"
#       target: "[[React MOC]]"       # optional override
#     - entity: "TypeScript"
#
# Leave empty if you don't use wikilinks:
wikilinks: {}

# ── Enrichment ───────────────────────────────────────────
# After processing each tweet, fetch linked GitHub/blog URLs via Jina Reader
# and append as a "## Linked Content" section in the note.
# Set enabled: false to disable (faster, less content).
enrichment:
  enabled: true
  max_links_per_note: 3    # Max number of linked URLs to fetch per note

# ── Note Template ────────────────────────────────────────
template:
  base_tags:               # Tags added to every note's frontmatter
    - "type/tweet"
    - "source/twitter"
  # Per-category tags (defined above) are merged with base_tags automatically.
  # No changes needed here to use that feature.
  include_engagement: true  # Show 💬🔁❤️👁🔖 engagement stats line
  include_my_notes: true    # Add empty "## My Notes" section at end
  distillation_start: 0     # Initial value for the distillation frontmatter field
